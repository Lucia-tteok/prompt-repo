<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提示词储存库</title>
<style>
  :root {
    --bg: #f6f8f5;
    --surface: #ffffff;
    --surface-soft: #eef4ef;
    --text: #16211b;
    --muted: #6c7a70;
    --line: #dfe7e1;
    --green: #1f6f48;
    --green-2: #2f8b5b;
    --green-soft: #dfeee5;
    --yellow: #c9a227;
    --danger: #b54747;
    --shadow: 0 12px 36px rgba(22, 33, 27, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background: var(--bg);
  }

  button, input, textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app {
    max-width: 1120px;
    margin: 0 auto;
    padding: 28px 18px 56px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 28px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .brand-mark {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: var(--green);
    color: white;
    display: grid;
    place-items: center;
    font-weight: 800;
    box-shadow: 0 8px 18px rgba(31, 111, 72, 0.18);
    flex: 0 0 auto;
  }

  .brand h1 {
    margin: 0;
    font-size: 22px;
    line-height: 1.2;
    letter-spacing: 0;
  }

  .brand p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .primary-btn {
    border: 0;
    height: 42px;
    padding: 0 16px;
    border-radius: 10px;
    background: var(--green);
    color: white;
    font-weight: 650;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    box-shadow: 0 10px 22px rgba(31, 111, 72, 0.18);
  }

  .primary-btn:hover {
    background: #185d3c;
  }

  .content-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: end;
    gap: 18px;
    margin-bottom: 18px;
  }

  .section-title h2 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0;
  }

  .section-title p {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 14px;
  }

  .search {
    position: relative;
    width: min(360px, 100%);
  }

  .search input {
    width: 100%;
    height: 42px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: white;
    padding: 0 14px 0 40px;
    outline: none;
    color: var(--text);
  }

  .search input:focus {
    border-color: var(--green-2);
    box-shadow: 0 0 0 4px rgba(47, 139, 91, 0.12);
  }

  .search::before {
    content: "";
    position: absolute;
    left: 15px;
    top: 50%;
    width: 14px;
    height: 14px;
    border: 2px solid #8a988f;
    border-radius: 50%;
    transform: translateY(-50%);
  }

  .search::after {
    content: "";
    position: absolute;
    left: 27px;
    top: 27px;
    width: 8px;
    height: 2px;
    background: #8a988f;
    transform: rotate(45deg);
    border-radius: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(238px, 1fr));
    gap: 16px;
  }

  .card {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(22, 33, 27, 0.02);
    transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: #c7d8cc;
    box-shadow: var(--shadow);
  }

  .thumb {
    position: relative;
    aspect-ratio: 4 / 3;
    background: linear-gradient(135deg, #e8efe9, #f7f9f6);
    overflow: hidden;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb-empty {
    height: 100%;
    display: grid;
    place-items: center;
    color: var(--green);
    font-size: 28px;
    font-weight: 800;
  }

  .count {
    position: absolute;
    top: 10px;
    right: 10px;
    min-width: 28px;
    height: 24px;
    padding: 0 8px;
    border-radius: 999px;
    background: rgba(22, 33, 27, 0.72);
    color: white;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  .card-body {
    padding: 14px 14px 16px;
  }

  .card-title {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-text {
    margin: 8px 0 0;
    min-height: 42px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    margin-top: 12px;
    color: #92a098;
    font-size: 12px;
  }

  .empty {
    grid-column: 1 / -1;
    border: 1px dashed #cbd8cf;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.62);
    min-height: 260px;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 30px;
  }

  .empty strong {
    display: block;
    margin-bottom: 8px;
    font-size: 16px;
  }

  .empty span {
    color: var(--muted);
    font-size: 14px;
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(12, 18, 15, 0.45);
  }

  .overlay.show {
    display: flex;
  }

  .modal {
    width: min(680px, 100%);
    max-height: min(820px, 92vh);
    overflow: auto;
    background: white;
    border-radius: 14px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
  }

  .modal-head {
    position: sticky;
    top: 0;
    z-index: 1;
    min-height: 62px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }

  .modal-head h3 {
    margin: 0;
    font-size: 17px;
    line-height: 1.35;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    border: 1px solid var(--line);
    background: white;
    color: var(--text);
    display: grid;
    place-items: center;
    font-size: 20px;
  }

  .icon-btn:hover {
    background: var(--surface-soft);
  }

  .modal-body {
    padding: 18px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 650;
    color: #35423a;
  }

  .field input,
  .field textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: white;
    outline: none;
    color: var(--text);
  }

  .field input {
    height: 42px;
    padding: 0 12px;
  }

  .field textarea {
    min-height: 150px;
    padding: 12px;
    resize: vertical;
    line-height: 1.7;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: var(--green-2);
    box-shadow: 0 0 0 4px rgba(47, 139, 91, 0.12);
  }

  .upload-box {
    min-height: 112px;
    border: 1px dashed #b9c9bf;
    border-radius: 12px;
    background: #fbfcfb;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 18px;
  }

  .upload-box strong {
    display: block;
    color: var(--green);
    font-size: 14px;
  }

  .upload-box span {
    display: block;
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
  }

  .previews {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }

  .preview {
    position: relative;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface-soft);
  }

  .preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .preview button {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 24px;
    height: 24px;
    border: 0;
    border-radius: 999px;
    background: rgba(0,0,0,0.62);
    color: white;
  }

  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .secondary-btn,
  .danger-btn {
    height: 40px;
    padding: 0 14px;
    border-radius: 10px;
    background: white;
    font-weight: 650;
  }

  .secondary-btn {
    border: 1px solid var(--line);
    color: var(--text);
  }

  .danger-btn {
    border: 1px solid #e5c7c7;
    color: var(--danger);
  }

  .detail-images {
    display: grid;
    gap: 12px;
    margin-bottom: 16px;
  }

  .detail-images img {
    width: 100%;
    border-radius: 12px;
    display: block;
  }

  .detail-text {
    white-space: pre-wrap;
    line-height: 1.8;
    font-size: 15px;
    padding: 16px;
    border-radius: 12px;
    background: var(--surface-soft);
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    z-index: 40;
    transform: translate(-50%, 14px);
    opacity: 0;
    pointer-events: none;
    padding: 10px 14px;
    border-radius: 999px;
    background: #16211b;
    color: white;
    font-size: 13px;
    transition: 0.18s ease;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  @media (max-width: 680px) {
    .app { padding: 20px 14px 40px; }
    .topbar { align-items: flex-start; }
    .brand h1 { font-size: 20px; }
    .brand p { display: none; }
    .primary-btn { height: 40px; padding: 0 12px; }
    .content-head { grid-template-columns: 1fr; align-items: stretch; }
    .search { width: 100%; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .card-body { padding: 12px; }
    .modal { border-radius: 12px; }
    .modal-body { padding: 16px; }
    .actions { flex-wrap: wrap; }
    .actions button { flex: 1; }
  }
</style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">P</div>
        <div>
          <h1>提示词储存库</h1>
          <p>保存图文提示词，快速浏览与复制</p>
        </div>
      </div>
      <button class="primary-btn" onclick="openUpload()">+ 新建</button>
    </header>

    <section class="content-head">
      <div class="section-title">
        <h2>全部内容</h2>
        <p id="countText">0 条提示词</p>
      </div>
      <div class="search">
        <input id="searchInput" type="search" placeholder="搜索标题或内容">
      </div>
    </section>

    <section class="grid" id="gallery"></section>
  </main>

  <div class="overlay" id="uploadOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3>新建提示词</h3>
        <button class="icon-btn" onclick="closeUpload()" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="inputTitle">标题</label>
          <input id="inputTitle" type="text" placeholder="例如：森林系人物摄影">
        </div>
        <div class="field">
          <label for="inputText">内容</label>
          <textarea id="inputText" placeholder="粘贴或输入完整提示词"></textarea>
        </div>
        <div class="field">
          <label>图片</label>
          <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div>
              <strong>选择图片</strong>
              <span>支持多张图片，第一张会作为封面</span>
            </div>
          </div>
          <input id="fileInput" type="file" accept="image/*" multiple hidden>
          <div class="previews" id="previewList"></div>
        </div>
        <div class="actions">
          <button class="secondary-btn" onclick="closeUpload()">取消</button>
          <button class="primary-btn" onclick="submitEntry()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="detailOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3 id="detailTitle"></h3>
        <button class="icon-btn" onclick="closeDetail()" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="detail-images" id="detailImgs"></div>
        <div class="detail-text" id="detailText"></div>
        <div class="actions">
          <button class="danger-btn" onclick="deleteEntry()">删除</button>
          <button class="secondary-btn" onclick="copyText()">复制文字</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'prompt_repository_data_v2';
  let entries = [];
  let pendingImages = [];
  let currentDetailId = null;

  function loadData() {
    try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch (e) { entries = []; }
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function formatDate(value) {
    return new Date(value).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
  }

  function render(list) {
    const gallery = document.getElementById('gallery');
    const data = list || entries;
    document.getElementById('countText').textContent = entries.length + ' 条提示词';

    if (data.length === 0) {
      gallery.innerHTML = '<div class="empty"><div><strong>还没有内容</strong><span>点击右上角新建，添加第一条图文提示词。</span></div></div>';
      return;
    }

    gallery.innerHTML = data.map(item => {
      const image = item.images && item.images[0]
        ? '<img src="' + item.images[0] + '" alt="">'
        : '<div class="thumb-empty">P</div>';
      const count = item.images && item.images.length > 1
        ? '<span class="count">' + item.images.length + '</span>'
        : '';
      return '<article class="card" onclick="openDetail(\'' + item.id + '\')">' +
        '<div class="thumb">' + image + count + '</div>' +
        '<div class="card-body">' +
        '<h3 class="card-title">' + escapeHtml(item.title || '未命名提示词') + '</h3>' +
        '<p class="card-text">' + escapeHtml(item.text || '无文字内容') + '</p>' +
        '<div class="card-meta">' + formatDate(item.createdAt) + '</div>' +
        '</div></article>';
    }).join('');
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '"', "'": '&#39;'
    }[c]));
  }

  function openUpload() {
    pendingImages = [];
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputText').value = '';
    document.getElementById('previewList').innerHTML = '';
    document.getElementById('uploadOverlay').classList.add('show');
  }

  function closeUpload() {
    document.getElementById('uploadOverlay').classList.remove('show');
  }

  document.getElementById('fileInput').addEventListener('change', function(e) {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = event => {
        pendingImages.push(event.target.result);
        renderPreview();
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  });

  function renderPreview() {
    document.getElementById('previewList').innerHTML = pendingImages.map((img, index) =>
      '<div class="preview"><img src="' + img + '" alt=""><button onclick="removePending(event,' + index + ')">×</button></div>'
    ).join('');
  }

  function removePending(event, index) {
    event.stopPropagation();
    pendingImages.splice(index, 1);
    renderPreview();
  }

  function submitEntry() {
    const title = document.getElementById('inputTitle').value.trim();
    const text = document.getElementById('inputText').value.trim();
    if (!title && !text && pendingImages.length === 0) {
      showToast('请至少添加一项内容');
      return;
    }

    const entry = {
      id: String(Date.now()),
      title,
      text,
      images: [...pendingImages],
      createdAt: new Date().toISOString()
    };

    entries.unshift(entry);
    try { saveData(); }
    catch (e) {
      entries.shift();
      showToast('图片过大，本地空间不足');
      return;
    }

    closeUpload();
    render();
    showToast('已保存');
  }

  function openDetail(id) {
    const item = entries.find(entry => entry.id === id);
    if (!item) return;

    currentDetailId = id;
    document.getElementById('detailTitle').textContent = item.title || '未命名提示词';
    document.getElementById('detailImgs').innerHTML = (item.images || []).map(img => '<img src="' + img + '" alt="">').join('');
    document.getElementById('detailText').textContent = item.text || '无文字内容';
    document.getElementById('detailOverlay').classList.add('show');
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('show');
    currentDetailId = null;
  }

  function deleteEntry() {
    if (!currentDetailId || !confirm('确定删除这条提示词吗？')) return;
    entries = entries.filter(entry => entry.id !== currentDetailId);
    saveData();
    closeDetail();
    renderFiltered();
    showToast('已删除');
  }

  function copyText() {
    const item = entries.find(entry => entry.id === currentDetailId);
    if (!item) return;
    navigator.clipboard.writeText(item.text || '').then(
      () => showToast('已复制'),
      () => showToast('复制失败')
    );
  }

  document.getElementById('searchInput').addEventListener('input', renderFiltered);

  function renderFiltered() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!keyword) {
      render();
      return;
    }
    render(entries.filter(item =>
      (item.title || '').toLowerCase().includes(keyword) ||
      (item.text || '').toLowerCase().includes(keyword)
    ));
  }

  let toastTimer;
  function showToast(text) {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  document.querySelectorAll('.overlay').forEach(overlay => {
    overlay.addEventListener('click', event => {
      if (event.target === overlay) overlay.classList.remove('show');
    });
  });

  loadData();
  render();
</script>
</body>
</html>
